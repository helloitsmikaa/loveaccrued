<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Your Receipt — Love Accrued</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF1493;
    --blue: #00D4FF;
    --primary: #FF1493;
    --primary-dim: rgba(255,20,147,0.12);
    --primary-glow: rgba(255,20,147,0.3);
    --bg: #080808;
    --white: #F8F8F8;
    --cream: #EDE8DC;
    --silver: #888;
    --grid: rgba(255,20,147,0.05);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    transition: background 0.5s ease;
  }
  body::after {
    content:'';
    position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity:.036; pointer-events:none; z-index:999;
  }
  .grid-bg {
    position:fixed; inset:0;
    background-image: linear-gradient(var(--grid) 1px,transparent 1px), linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:44px 44px;
    pointer-events:none; z-index:0;
    transition: all 0.5s ease;
  }

  /* NAV */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 48px;
    border-bottom: 1px solid var(--primary-dim);
    border-top: 3px solid var(--primary);
    backdrop-filter:blur(16px);
    background: rgba(8,8,8,0.85);
    transition: border-color 0.5s ease;
  }
  .nav-logo {
    font-family:'Bebas Neue',sans-serif;
    font-size:18px; letter-spacing:4px;
    display:flex; align-items:center; gap:8px;
    text-decoration:none; color:var(--white);
  }
  .nav-logo span { color:var(--primary); transition:color 0.5s; }
  .nav-product {
    font-size:9px; letter-spacing:3px;
    color:var(--primary); text-transform:uppercase;
    transition:color 0.5s;
  }

  /* SCREENS */
  .screen { display:none; min-height:100vh; }
  .screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:120px 24px 60px; }

  /* FORM SCREEN */
  .form-wrap { width:100%; max-width:540px; }
  .progress-bar { height:2px; background:rgba(255,255,255,0.06); margin-bottom:48px; }
  .progress-fill { height:100%; background:var(--primary); transition:width 0.4s ease, background 0.5s; }
  .step-count { font-size:9px; letter-spacing:4px; color:var(--primary); text-transform:uppercase; margin-bottom:16px; transition:color 0.5s; }
  .question-label {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(28px,5vw,44px);
    letter-spacing:1px; line-height:1.1;
    margin-bottom:8px;
  }
  .question-sub { font-size:10px; letter-spacing:3px; color:#555; text-transform:uppercase; margin-bottom:32px; }

  input[type="text"], textarea {
    width:100%;
    background:transparent;
    border:none;
    border-bottom:2px solid var(--primary);
    color:var(--white);
    font-family:'Space Mono',monospace;
    font-size:15px;
    padding:12px 0;
    outline:none;
    transition:border-color 0.5s;
  }
  input[type="text"]::placeholder, textarea::placeholder { color:rgba(255,255,255,0.18); }
  textarea { resize:none; min-height:120px; line-height:1.8; }

  .options-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .option-btn {
    padding:14px 12px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.02);
    color:#666;
    font-family:'Space Mono',monospace;
    font-size:10px; letter-spacing:2px;
    cursor:pointer; text-transform:uppercase;
    transition:all 0.15s;
  }
  .option-btn:hover { border-color:var(--primary); color:var(--primary); }
  .option-btn.selected { border-color:var(--primary); background:var(--primary-dim); color:var(--primary); }

  .btn-primary {
    display:block; width:100%; margin-top:28px;
    background:var(--primary); color:#080808;
    font-family:'Bebas Neue',sans-serif;
    font-size:16px; letter-spacing:4px;
    padding:17px; border:none; cursor:pointer;
    transition:all 0.2s;
  }
  .btn-primary:hover { opacity:0.85; }
  .btn-primary:disabled { opacity:0.25; cursor:not-allowed; }
  .btn-back {
    background:transparent; border:none;
    color:#444; font-family:'Space Mono',monospace;
    font-size:10px; letter-spacing:2px;
    cursor:pointer; padding:12px 0;
    text-transform:uppercase; margin-top:8px;
  }
  .btn-back:hover { color:var(--silver); }
  .btn-skip {
    background:transparent; border:none;
    color:#333; font-family:'Space Mono',monospace;
    font-size:10px; letter-spacing:2px;
    cursor:pointer; padding:12px 16px;
    text-transform:uppercase; margin-top:8px;
  }
  .error-msg { font-size:10px; color:#FF4444; letter-spacing:2px; text-transform:uppercase; margin-bottom:16px; }

  /* LOADING SCREEN */
  #screen-loading { text-align:center; }
  .loading-icon { font-size:56px; display:block; margin-bottom:24px; animation:spin 2.5s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .loading-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:44px; letter-spacing:3px;
    color:var(--primary); margin-bottom:12px;
    transition:color 0.5s;
  }
  .loading-msg { font-size:10px; letter-spacing:4px; color:#444; text-transform:uppercase; min-height:20px; }

  /* RECEIPT SCREEN */
  #screen-receipt { padding-top:100px; }
  .receipt-container { width:100%; max-width:400px; margin:0 auto; }
  .receipt-eyebrow { font-size:9px; letter-spacing:5px; color:var(--primary); text-transform:uppercase; text-align:center; margin-bottom:20px; transition:color 0.5s; }

  .receipt-paper {
    background: linear-gradient(180deg,#F0EBE0,#E8E3D4);
    color:#1a1a1a;
    font-family:'Courier New',Courier,monospace;
    font-size:11px; line-height:1.75;
    padding:28px 22px 32px;
    position:relative;
    box-shadow:0 20px 80px rgba(0,0,0,0.6), 0 0 40px var(--primary-glow);
    transition: box-shadow 0.5s;
  }
  .receipt-paper::before {
    content:'';
    position:absolute; top:-9px; left:0; right:0; height:9px;
    background:linear-gradient(135deg,transparent 33.33%,#F0EBE0 33.33%) 0 0,linear-gradient(225deg,transparent 33.33%,#F0EBE0 33.33%) 0 0;
    background-size:9px 9px; background-repeat:repeat-x;
  }
  .receipt-paper::after {
    content:'';
    position:absolute; bottom:-9px; left:0; right:0; height:9px;
    background:linear-gradient(315deg,transparent 33.33%,#E8E3D4 33.33%) 0 0,linear-gradient(45deg,transparent 33.33%,#E8E3D4 33.33%) 0 0;
    background-size:9px 9px; background-repeat:repeat-x;
  }
  .r-store { text-align:center; font-weight:700; font-size:13px; letter-spacing:3px; text-transform:uppercase; margin-bottom:1px; }
  .r-tag { text-align:center; font-size:8.5px; color:#666; letter-spacing:1px; }
  .r-addr { text-align:center; font-size:8.5px; color:#777; margin-bottom:4px; }
  .r-div { border:none; border-top:1px dashed #aaa; margin:7px 0; }
  .r-div-s { border:none; border-top:1.5px solid #777; margin:5px 0; }
  .r-meta { font-size:8.5px; color:#666; margin-bottom:1px; }
  .r-head { text-align:center; font-size:10px; letter-spacing:2px; font-weight:700; text-transform:uppercase; margin:5px 0 3px; }
  .r-row { display:flex; justify-content:space-between; font-size:10.5px; padding:1px 0; }
  .r-sub { display:flex; justify-content:space-between; font-size:8.5px; color:#666; padding-left:8px; }
  .r-tot { display:flex; justify-content:space-between; font-size:11.5px; font-weight:700; padding:2px 0; }
  .r-bal { display:flex; justify-content:space-between; font-size:13px; font-weight:700; border-top:2px solid #1a1a1a; padding-top:6px; margin-top:3px; letter-spacing:1px; }
  .r-thanks { text-align:center; font-size:8.5px; letter-spacing:2px; text-transform:uppercase; margin-top:6px; color:#666; }
  .r-barcode { text-align:center; letter-spacing:-1.5px; font-size:28px; margin:8px 0 1px; color:#1a1a1a; line-height:1; }
  .r-barnum { text-align:center; font-size:7.5px; color:#888; letter-spacing:3px; }

  /* ACTIONS */
  .actions { margin-top:32px; display:flex; flex-direction:column; gap:10px; }
  .act-btn {
    display:block; width:100%; padding:16px;
    font-family:'Bebas Neue',sans-serif;
    font-size:15px; letter-spacing:4px;
    text-align:center; text-decoration:none;
    cursor:pointer; border:none; transition:all 0.2s;
  }
  .act-primary { background:var(--primary); color:#080808; }
  .act-primary:hover { opacity:0.85; }
  .act-secondary { background:transparent; border:1px solid rgba(255,255,255,0.12); color:var(--white); }
  .act-secondary:hover { border-color:var(--primary); color:var(--primary); }
  .act-note { font-size:9px; letter-spacing:2px; color:#333; text-align:center; text-transform:uppercase; }
  .act-another { background:transparent; border:none; color:#444; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; cursor:pointer; text-transform:uppercase; text-align:center; }
  .act-another:hover { color:var(--silver); }

  /* PRINT */
  @media print {
    body { background:white !important; }
    body::after, .grid-bg, nav, .receipt-eyebrow, .actions { display:none !important; }
    #screen-receipt { padding:20px !important; }
    .receipt-paper { box-shadow:none !important; }
  }

  @media(max-width:640px) {
    nav { padding:14px 20px; }
    .screen.active { padding:100px 20px 40px; }
    .options-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="grid-bg" id="grid-bg"></div>

<nav>
  <a href="/" class="nav-logo">
    <svg width="18" height="28" viewBox="0 0 500 500" aria-hidden="true">
      <rect width="500" height="500" fill="#080808"/>
      <path d="M 165 92 L 335 92 L 335 418 L 165 418 Z" fill="#EDE8DC"/>
      <path id="nav-heart" d="M 250 348 C 222 330 196 306 196 280 C 196 260 210 249 226 253 C 237 256 248 268 250 274 C 252 268 263 256 274 253 C 290 249 304 260 304 280 C 304 306 278 330 250 348 Z" fill="#FF1493"/>
    </svg>
    LOVE<span id="nav-accent">ACCRUED</span>
  </a>
  <div class="nav-product" id="nav-product">Create Your Receipt</div>
</nav>

<!-- FORM SCREEN -->
<div class="screen active" id="screen-form">
  <div class="form-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="step-count" id="step-count"></div>
    <div class="question-label" id="q-label"></div>
    <div class="question-sub" id="q-sub"></div>
    <div class="error-msg" id="error-msg" style="display:none;"></div>
    <div id="q-input"></div>
    <button class="btn-primary" id="btn-next" onclick="next()">Continue →</button>
    <div style="display:flex; gap:8px;">
      <button class="btn-back" onclick="back()">← Back</button>
      <button class="btn-skip" id="btn-skip" style="display:none;" onclick="skip()">Skip</button>
    </div>
  </div>
</div>

<!-- LOADING SCREEN -->
<div class="screen" id="screen-loading">
  <span class="loading-icon">🧾</span>
  <div class="loading-title" id="loading-title">GENERATING</div>
  <div class="loading-msg" id="loading-msg"></div>
</div>

<!-- RECEIPT SCREEN -->
<div class="screen" id="screen-receipt">
  <div class="receipt-container">
    <div class="receipt-eyebrow" id="receipt-eyebrow">✦ Your receipt is ready ✦</div>
    <div class="receipt-paper" id="receipt-paper"></div>
    <div class="actions">
      <button class="act-btn act-primary" onclick="window.print()">Download / Print — $14.99</button>
      <button class="act-btn act-secondary" id="btn-physical" onclick="orderPhysical()">Order Giant Physical Box — $79.99</button>
      <div class="act-note">Physical orders fulfilled within 3–5 business days</div>
      <button class="act-another" onclick="startOver()">← Make another receipt</button>
    </div>
  </div>
</div>

<script>
// ─── SETUP ────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const productType = params.get('type') === 'breakup' ? 'breakup' : 'love';
const isPhysical = params.get('physical') === 'true';

// Color theme
const COLORS = {
  love:    { primary:'#FF1493', dim:'rgba(255,20,147,0.12)', glow:'rgba(255,20,147,0.25)', grid:'rgba(255,20,147,0.05)', bg:'#080808' },
  breakup: { primary:'#00D4FF', dim:'rgba(0,212,255,0.12)',  glow:'rgba(0,212,255,0.2)',   grid:'rgba(0,212,255,0.05)',  bg:'#06080F' },
};
const t = COLORS[productType];

// Apply theme
document.documentElement.style.setProperty('--primary', t.primary);
document.documentElement.style.setProperty('--primary-dim', t.dim);
document.documentElement.style.setProperty('--primary-glow', t.glow);
document.documentElement.style.setProperty('--grid', t.grid);
document.documentElement.style.setProperty('--bg', t.bg);
document.getElementById('nav-heart').setAttribute('fill', t.primary);
document.getElementById('nav-accent').style.color = t.primary;
document.getElementById('nav-product').style.color = t.primary;
document.getElementById('nav-product').textContent = productType === 'love' ? 'Love Receipt' : 'Breakup Receipt';

// ─── QUESTIONS ────────────────────────────────────────────────────────
const LOVE_QS = [
  { id:'name',         label:"Who is this for?",                          sub:"Their name, exactly as you'd say it",      type:'text',     placeholder:'e.g. Dad, Marcus, my best friend Jess' },
  { id:'relationship', label:"How do you know them?",                     sub:"Pick the closest one",                     type:'buttons',  options:['Partner','Dad','Mom','Husband','Wife','Best Friend','Sibling','Other'] },
  { id:'duration',     label:"How long have they been in your life?",     sub:"Estimate is fine",                         type:'text',     placeholder:'e.g. 4 years, my whole life, since college' },
  { id:'always_does',  label:"What's something they always do?",          sub:"The thing you'd miss if they stopped",     type:'textarea', placeholder:'Take your time...' },
  { id:'memory',       label:"Share a memory that says everything",       sub:"A moment, a feeling, something specific",  type:'textarea', placeholder:'The more specific the better...' },
  { id:'feel',         label:"What do you want them to feel?",            sub:"Pick one",                                 type:'buttons',  options:['Seen','Loved','Appreciated','Emotional','All of the above'] },
  { id:'extra',        label:"Anything else we should know?",             sub:"Optional — the more you give us the better",type:'textarea', placeholder:'Inside jokes, quirks, things nobody else knows...', optional:true },
];
const BREAKUP_QS = [
  { id:'name',              label:"What should we call them?",            sub:"First name or just 'them'",                type:'text',     placeholder:"e.g. Alex, him, her, them" },
  { id:'duration',          label:"How long were you together?",          sub:"Or how long the situation lasted",         type:'text',     placeholder:'e.g. 8 months, almost 2 years' },
  { id:'held_on',           label:"What kept you the longest?",           sub:"What made it hard to walk away",           type:'textarea', placeholder:'The good parts, the hope, the feeling...' },
  { id:'cost',              label:"What did it actually cost you?",       sub:"Be specific. This is what we document.",   type:'textarea', placeholder:'Peace of mind, self-worth, time, money...' },
  { id:'want_them_to_know', label:"What do you need them to understand?", sub:"The thing you never got to say clearly",   type:'textarea', placeholder:'Say it here...' },
  { id:'tone',              label:"How should this land?",                sub:"Pick the energy",                          type:'buttons',  options:['Cold and clinical','Devastating but calm','Darkly funny','Brutal honesty'] },
];

const questions = productType === 'love' ? LOVE_QS : BREAKUP_QS;
let step = 0;
let answers = {};
let currentVal = '';
let loadingInterval = null;

// ─── RENDER QUESTION ──────────────────────────────────────────────────
function renderQuestion() {
  const q = questions[step];
  const pct = ((step + 1) / questions.length) * 100;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('step-count').textContent = 'Step ' + (step + 1) + ' of ' + questions.length;
  document.getElementById('q-label').textContent = q.label;
  document.getElementById('q-sub').textContent = q.sub;
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('btn-skip').style.display = q.optional ? 'block' : 'none';

  currentVal = answers[q.id] || '';

  const container = document.getElementById('q-input');
  container.innerHTML = '';

  if (q.type === 'text') {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = q.placeholder || '';
    inp.value = currentVal;
    inp.addEventListener('input', e => currentVal = e.target.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') next(); });
    container.appendChild(inp);
    setTimeout(() => inp.focus(), 50);

  } else if (q.type === 'textarea') {
    const ta = document.createElement('textarea');
    ta.placeholder = q.placeholder || '';
    ta.value = currentVal;
    ta.rows = 5;
    ta.addEventListener('input', e => currentVal = e.target.value);
    container.appendChild(ta);
    setTimeout(() => ta.focus(), 50);

  } else if (q.type === 'buttons') {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (currentVal === opt ? ' selected' : '');
      btn.textContent = opt;
      btn.onclick = () => {
        currentVal = opt;
        grid.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      };
      grid.appendChild(btn);
    });
    container.appendChild(grid);
  }
}

// ─── NAVIGATION ───────────────────────────────────────────────────────
function next() {
  const q = questions[step];
  if (!currentVal.trim() && !q.optional) {
    const err = document.getElementById('error-msg');
    err.textContent = '✦ Please answer before continuing';
    err.style.display = 'block';
    return;
  }
  answers[q.id] = currentVal.trim();
  currentVal = '';

  if (step < questions.length - 1) {
    step++;
    renderQuestion();
  } else {
    generate();
  }
}

function back() {
  if (step === 0) {
    window.location.href = '/';
    return;
  }
  step--;
  renderQuestion();
}

function skip() {
  answers[questions[step].id] = '';
  step++;
  if (step < questions.length) {
    renderQuestion();
  } else {
    generate();
  }
}

function startOver() {
  step = 0;
  answers = {};
  currentVal = '';
  showScreen('form');
  renderQuestion();
}

// ─── SCREENS ──────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ─── PROMPTS ──────────────────────────────────────────────────────────
function buildPrompt() {
  const a = answers;
  if (productType === 'love') {
    return `Generate a personalized love receipt for Love Accrued. Return ONLY valid JSON, no markdown, no other text.

Relationship details:
Name: ${a.name}
Relationship: ${a.relationship}
Duration: ${a.duration}
What they always do: ${a.always_does}
A key memory: ${a.memory}
What sender wants them to feel: ${a.feel}
Extra: ${a.extra || 'none'}

Create 6 to 8 line items SPECIFIC to this person. Pull directly from what was shared. Not generic. Quantities should feel personal ("4 years of", "every single morning", "1,460 days").

Return exactly this JSON:
{"recipient":"their name","relationship":"what they are","items":[{"name":"max 4 words","detail":"specific personal detail from their story","qty":"personal quantity","price":"$XXX.XX"}],"subtotal":"$X,XXX.XX","tax_label":"Worth Every Penny Tax","tax_amount":"$XXX.XX","total_label":"TOTAL LOVE","total_value":"PRICELESS","closing":"one short personal closing line for this specific relationship","signoff":"brief warm sign-off"}`;
  } else {
    return `Generate a personalized breakup receipt (final bill) for Love Accrued. Return ONLY valid JSON, no markdown, no other text.

Situation:
Reference: ${a.name}
Duration: ${a.duration}
What kept them: ${a.held_on}
What it cost: ${a.cost}
What they need to know: ${a.want_them_to_know}
Tone: ${a.tone}

Create 6 to 8 line items documenting what was taken or lost. Pull directly from what was shared. Not generic. Quantities should feel accurate ("8 months of", "47 times", "3 weeks of silence").

Return exactly this JSON:
{"recipient":"how to refer to them","items":[{"name":"max 4 words","detail":"specific detail from their story","qty":"specific quantity","price":"$XXX.XX"}],"subtotal":"$X,XXX.XX","tax_label":"Unbothered Tax","tax_amount":"$XXX.XX","total_label":"BALANCE DUE","total_value":"UNPAID","closing":"one cold accurate closing line","signoff":"brief unbothered sign-off"}`;
  }
}

// ─── GENERATE ─────────────────────────────────────────────────────────
async function generate() {
  showScreen('loading');

  const msgs = productType === 'love'
    ? ['Counting every moment...','Making it personal...','Finding the right words...','Almost ready...']
    : ['Reading between the lines...','Documenting the damage...','Running the numbers...','Finalizing the bill...'];

  let i = 0;
  document.getElementById('loading-msg').textContent = msgs[0];
  loadingInterval = setInterval(() => {
    i = (i + 1) % msgs.length;
    document.getElementById('loading-msg').textContent = msgs[i];
  }, 1800);

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: buildPrompt() }],
      }),
    });

    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const receipt = JSON.parse(clean);

    clearInterval(loadingInterval);
    renderReceipt(receipt);
    showScreen('receipt');

  } catch (e) {
    clearInterval(loadingInterval);
    step = questions.length - 1;
    showScreen('form');
    renderQuestion();
    const err = document.getElementById('error-msg');
    err.textContent = '✦ Something went wrong. Please try again.';
    err.style.display = 'block';
  }
}

// ─── RENDER RECEIPT ───────────────────────────────────────────────────
function renderReceipt(r) {
  const orderNum = 'LA-' + Math.floor(Math.random() * 900000 + 100000);
  const today = new Date().toLocaleDateString('en-US', { month:'2-digit', day:'2-digit', year:'numeric' });
  const isLove = productType === 'love';

  const paper = document.getElementById('receipt-paper');
  paper.innerHTML = `
    <div class="r-store">LOVE ACCRUED</div>
    <div class="r-tag">Everything You Felt. Finally On Paper.</div>
    <div class="r-addr">loveaccrued.ai</div>
    <hr class="r-div">
    <div class="r-meta">DATE: ${today}</div>
    <div class="r-meta">ORDER: #${orderNum}</div>
    <div class="r-meta">${isLove ? 'FOR' : 'RECIPIENT'}: ${(r.recipient || answers.name || 'THEM').toUpperCase()}</div>
    <hr class="r-div">
    <div class="r-head">${isLove ? '*** LOVE RECEIPT ***' : '*** FINAL BILL ***'}</div>
    <hr class="r-div">
    ${(r.items || []).map(item => `
      <div class="r-row"><span>${item.name}</span></div>
      <div class="r-sub"><span>${item.detail}</span></div>
      <div class="r-sub"><span>${item.qty}</span><span>${item.price}</span></div>
    `).join('')}
    <hr class="r-div">
    <div class="r-tot"><span>SUBTOTAL</span><span>${r.subtotal}</span></div>
    <div class="r-tot"><span>${r.tax_label}</span><span>${r.tax_amount}</span></div>
    <hr class="r-div-s">
    <div class="r-bal"><span>${r.total_label}</span><span>${r.total_value}</span></div>
    <hr class="r-div">
    <div class="r-thanks">${r.closing || ''}</div>
    <div class="r-thanks">${r.signoff || ''}</div>
    <div class="r-barcode">||| || ||| | || ||| ||</div>
    <div class="r-barnum">${orderNum}-${new Date().getFullYear()}</div>
  `;
}
